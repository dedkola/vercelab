name: verclab

services:
  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=${VERCLAB_PROXY_NETWORK:-verclab_proxy}
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=${VERCLAB_PROXY_ENTRYPOINT:-websecure}
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --ping=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - ${VERCLAB_DOCKER_SOCKET_PATH:-/var/run/docker.sock}:${VERCLAB_DOCKER_SOCKET_PATH:-/var/run/docker.sock}:ro
      - ${VERCLAB_HOST_ROOT:-/opt/verclab}/traefik/dynamic:/etc/traefik/dynamic:ro
      - ${VERCLAB_HOST_ROOT:-/opt/verclab}/traefik/certs:/etc/traefik/certs:ro
    networks:
      - proxy

  control-plane:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      VERCLAB_HOST_ROOT: ${VERCLAB_HOST_ROOT:-/opt/verclab}
      VERCLAB_APPS_DIR: ${VERCLAB_HOST_ROOT:-/opt/verclab}/data/apps
      VERCLAB_LOGS_DIR: ${VERCLAB_HOST_ROOT:-/opt/verclab}/data/logs
      VERCLAB_LOCKS_DIR: ${VERCLAB_HOST_ROOT:-/opt/verclab}/data/locks
      VERCLAB_DATABASE_PATH: ${VERCLAB_HOST_ROOT:-/opt/verclab}/data/db/verclab.sqlite
      VERCLAB_DOCKER_SOCKET_PATH: ${VERCLAB_DOCKER_SOCKET_PATH:-/var/run/docker.sock}
    healthcheck:
      test:
        [
          CMD,
          node,
          -e,
          "fetch('http://127.0.0.1:3000/api/health').then((response) => { process.exit(response.ok ? 0 : 1); }).catch(() => process.exit(1));",
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ${VERCLAB_HOST_ROOT:-/opt/verclab}:${VERCLAB_HOST_ROOT:-/opt/verclab}
      - ${VERCLAB_DOCKER_SOCKET_PATH:-/var/run/docker.sock}:${VERCLAB_DOCKER_SOCKET_PATH:-/var/run/docker.sock}
    labels:
      - traefik.enable=true
      - traefik.docker.network=${VERCLAB_PROXY_NETWORK:-verclab_proxy}
      - 'traefik.http.routers.verclab.rule=Host(`${VERCLAB_ADMIN_HOST}`)'
      - traefik.http.routers.verclab.entrypoints=${VERCLAB_PROXY_ENTRYPOINT:-websecure}
      - traefik.http.routers.verclab.tls=true
      - traefik.http.services.verclab.loadbalancer.server.port=3000
    networks:
      - proxy

networks:
  proxy:
    name: ${VERCLAB_PROXY_NETWORK:-verclab_proxy}