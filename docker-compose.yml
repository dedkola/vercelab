name: vercelab

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${VERCELAB_POSTGRES_USER:-vercelab}
      POSTGRES_PASSWORD: ${VERCELAB_POSTGRES_PASSWORD:-vercelab}
      POSTGRES_DB: ${VERCELAB_POSTGRES_DB:-vercelab}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${VERCELAB_POSTGRES_USER:-vercelab} -d ${VERCELAB_POSTGRES_DB:-vercelab}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ${VERCELAB_POSTGRES_DATA_DIR:-/opt/vercelab/data/postgres}:/var/lib/postgresql/data
    networks:
      - proxy

  influxdb:
    image: influxdb:3-core
    restart: unless-stopped
    command:
      - influxdb3
      - serve
      - --node-id=vercelab-node
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
    healthcheck:
      test: [CMD, influxdb3, show, databases]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - ${VERCELAB_INFLUXDB_DATA_DIR:-/opt/vercelab/data/influxdb}:/var/lib/influxdb3/data
    networks:
      - proxy

  traefik:
    image: traefik:v3.0
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=${VERCELAB_PROXY_NETWORK:-vercelab_proxy}
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=${VERCELAB_PROXY_ENTRYPOINT:-websecure}
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --ping=true
    ports:
      - 80:80
      - 443:443
    volumes:
      - ${VERCELAB_DOCKER_SOCKET_PATH:-/var/run/docker.sock}:${VERCELAB_DOCKER_SOCKET_PATH:-/var/run/docker.sock}:ro
      - ${VERCELAB_TRAEFIK_DYNAMIC_DIR:-/opt/vercelab/traefik/dynamic}:/etc/traefik/dynamic:ro
      - ${VERCELAB_TRAEFIK_CERTS_DIR:-/opt/vercelab/traefik/certs}:/etc/traefik/certs:ro
    networks:
      - proxy

  control-plane:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      HOSTNAME: ${HOSTNAME:-0.0.0.0}
      VERCELAB_HOST_ROOT: ${VERCELAB_HOST_ROOT:-/opt/vercelab}
      VERCELAB_DATA_ROOT: ${VERCELAB_DATA_ROOT:-/opt/vercelab/data}
      VERCELAB_TRAEFIK_DYNAMIC_DIR: ${VERCELAB_TRAEFIK_DYNAMIC_DIR:-/opt/vercelab/traefik/dynamic}
      VERCELAB_TRAEFIK_CERTS_DIR: ${VERCELAB_TRAEFIK_CERTS_DIR:-/opt/vercelab/traefik/certs}
      VERCELAB_APPS_DIR: ${VERCELAB_APPS_DIR:-/opt/vercelab/data/apps}
      VERCELAB_LOGS_DIR: ${VERCELAB_LOGS_DIR:-/opt/vercelab/data/logs}
      VERCELAB_LOCKS_DIR: ${VERCELAB_LOCKS_DIR:-/opt/vercelab/data/locks}
      VERCELAB_DATABASE_PROVIDER: ${VERCELAB_DATABASE_PROVIDER:-postgres}
      VERCELAB_POSTGRES_URL: ${VERCELAB_POSTGRES_URL:-postgres://vercelab:vercelab@postgres:5432/vercelab}
      VERCELAB_POSTGRES_USER: ${VERCELAB_POSTGRES_USER:-vercelab}
      VERCELAB_POSTGRES_PASSWORD: ${VERCELAB_POSTGRES_PASSWORD:-vercelab}
      VERCELAB_POSTGRES_DB: ${VERCELAB_POSTGRES_DB:-vercelab}
      VERCELAB_INFLUXDB_URL: ${VERCELAB_INFLUXDB_URL:-http://influxdb:8181}
      VERCELAB_INFLUXDB_DATABASE: ${VERCELAB_INFLUXDB_DATABASE:-vercelab_metrics}
      VERCELAB_INFLUXDB_TOKEN: ${VERCELAB_INFLUXDB_TOKEN:-}
      VERCELAB_INFLUXDB_RETENTION_DAYS: ${VERCELAB_INFLUXDB_RETENTION_DAYS:-90}
      VERCELAB_DOCKER_SOCKET_PATH: ${VERCELAB_DOCKER_SOCKET_PATH:-/var/run/docker.sock}
      VERCELAB_HOST_PROC_PATH: ${VERCELAB_HOST_PROC_PATH:-/host/proc}
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    healthcheck:
      test:
        [
          CMD,
          node,
          -e,
          "const port = process.env.PORT || '3000'; fetch('http://127.0.0.1:' + port + '/api/health').then((response) => { process.exit(response.ok ? 0 : 1); }).catch(() => process.exit(1));",
        ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      - ${VERCELAB_HOST_ROOT:-/opt/vercelab}:${VERCELAB_HOST_ROOT:-/opt/vercelab}
      - ${VERCELAB_DOCKER_SOCKET_PATH:-/var/run/docker.sock}:${VERCELAB_DOCKER_SOCKET_PATH:-/var/run/docker.sock}
      - /proc:${VERCELAB_HOST_PROC_PATH:-/host/proc}:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=${VERCELAB_PROXY_NETWORK:-vercelab_proxy}
      - "traefik.http.routers.vercelab.rule=Host(`${VERCELAB_ADMIN_HOST}`)"
      - traefik.http.routers.vercelab.entrypoints=${VERCELAB_PROXY_ENTRYPOINT:-websecure}
      - traefik.http.routers.vercelab.tls=true
      - traefik.http.services.vercelab.loadbalancer.server.port=${PORT:-3000}
    networks:
      - proxy

networks:
  proxy:
    name: ${VERCELAB_PROXY_NETWORK:-vercelab_proxy}
